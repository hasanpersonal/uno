<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiplayer UNO Arena</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="error-message" class="hidden"></div>
    <div id="animation-layer"></div>
    <div id="flash-turn-alert" class="hidden">YOUR TURN!</div>
    <div id="floating-chat-overlay" class="hidden"></div>

    <!-- Join Screen -->
    <div id="join-screen" class="screen active">
        <div class="panel">
            <h1>UNO ARENA</h1>
            <div class="input-group">
                <h3>Create New Room</h3>
                <input type="text" id="create-name" placeholder="Enter Your Name">
                <button id="btn-create-room">Create Room</button>
            </div>
            <div class="divider">OR</div>
            <div class="input-group">
                <h3>Join Existing Room</h3>
                <input type="text" id="join-name" placeholder="Enter Your Name">
                <input type="text" id="join-code" placeholder="Room Code">
                <button id="btn-join-room">Join Room</button>
            </div>
        </div>
    </div>

    <!-- Lobby Screen -->
    <div id="lobby-screen" class="screen hidden">
        <div class="panel lobby-panel">
            <h2>Room Code: <span id="lobby-room-id" class="highlight"></span></h2>
            <div class="lobby-grid">
                <div class="players-section">
                    <h3>Crew Members</h3>
                    <ul id="lobby-player-list"></ul>
                </div>
                <div class="chat-section">
                    <div id="lobby-chat-box" class="chat-box"></div>
                    <div class="chat-input-row">
                        <input type="text" id="lobby-chat-input" placeholder="Type a message...">
                        <button id="btn-lobby-send">Send</button>
                    </div>
                </div>
            </div>
            <div class="lobby-actions">
                <p id="wait-message">Waiting for host to start the game...</p>
                <button id="btn-start-game" class="hidden start-btn">START GAME</button>
            </div>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="screen hidden">
        <div class="game-header">
            <div id="dynamic-cycle-list"></div>
            <h2 id="current-turn-display">WAITING FOR CREW CODES...</h2>
            <button id="btn-toggle-chat" class="chat-toggle-btn">💬 Chat</button>
        </div>

        <div id="spectator-notice" class="hidden spectator-banner">You are now a Spectator!</div>

        <div class="play-area">
            <div class="deck-container">
                <div id="btn-draw-card" class="uno-deck">
                    <span>UNO</span>
                    <small>DRAW</small>
                </div>
            </div>
            <div class="discard-container">
                <div id="main-discard-card" class="uno-card-element"></div>
            </div>
        </div>

        <div class="player-hand-container">
            <h3>Your Cards</h3>
            <div id="player-cards-grid"></div>
        </div>

        <!-- In-Game Chat Popup -->
        <div id="game-chat-popup" class="hidden">
            <div class="chat-header">
                <span>Comms Link</span>
                <button id="btn-close-chat">✕</button>
            </div>
            <div id="game-chat-box" class="chat-box"></div>
            <div class="chat-input-row">
                <input type="text" id="game-chat-input" placeholder="Message...">
                <button id="btn-game-send">Send</button>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen hidden">
        <div class="panel">
            <h1>GAME OVER</h1>
            <h3>Final Standings</h3>
            <ul id="standings-list"></ul>
            <button id="btn-back-to-lobby" class="start-btn">Return to Lobby</button>
        </div>
    </div>

    <!-- Firebase Script as Module -->
    <script type="module" src="script.js"></script>
</body>
</html>
