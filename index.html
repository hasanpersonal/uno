<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UNO Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="lobby-screen">
            <h1>🃏 UNO Multiplayer</h1>
            
            <div class="lobby-layout">
                <div class="box create-box">
                    <h3>Create New Game</h3>
                    <input type="text" id="host-name" placeholder="Enter Your Name" autocomplete="off">
                    <button id="btn-create" class="btn green">Create Room</button>
                </div>
                
                <div class="divider">OR</div>
                
                <div class="box join-box">
                    <h3>Join Game</h3>
                    <input type="text" id="join-name" placeholder="Enter Your Name" autocomplete="off">
                    <input type="text" id="room-code-input" placeholder="Enter 4-Digit Room Code" autocomplete="off">
                    <button id="btn-join" class="btn blue">Join Room</button>
                </div>
            </div>
        </div>

        <div id="waiting-room" style="display: none;">
            <h1>Room Code: <span id="display-room-code" class="highlight"></span></h1>
            <div class="box">
                <h3>Players Joined:</h3>
                <ul id="players-list"></ul>
                <button id="btn-start" class="btn green" style="display: none;">Start Game</button>
                <p id="waiting-msg">Waiting for host to start...</p>
            </div>
        </div>

        <div id="game-board" style="display: none;">
            <div class="top-bar">
                <div>Room: <span id="game-room-id"></span></div>
                <div id="turn-indicator" class="turn-box">Waiting...</div>
            </div>

            <div id="opponents-area" class="opponents-container"></div>

            <div class="center-table">
                <div class="deck-area">
                    <button id="btn-draw" class="deck-btn">DRAW<br>(+1)</button>
                </div>
                <div class="discard-area">
                    <div id="current-card" class="uno-card"><span>--</span></div>
                </div>
            </div>

            <div class="my-hand-section">
                <h3>My Cards</h3>
                <div id="my-cards" class="cards-container"></div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    
    <script src="script.js"></script>
</body>
</html>
