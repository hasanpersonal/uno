<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Uno Online Multiplayer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 🔥 Flashy Turn Notification Overlay -->
    <div id="your-turn-overlay" class="hidden">
        <h1 class="bounce-in">YOUR TURN!</h1>
    </div>

    <div id="app-container">
        <div id="screens-area">
            
            <!-- 1. Entry / Login Screen -->
            <section id="entry-screen" class="screen active">
                <div class="glass-panel">
                    <h1>UNO Online</h1>
                    
                    <div class="action-block">
                        <h3>Create a New Room</h3>
                        <div class="input-group">
                            <label for="create-player-name">Your Name:</label>
                            <input type="text" id="create-player-name" placeholder="Enter your name...">
                        </div>
                        <button id="btn-create-room" class="btn primary">Create Room</button>
                    </div>

                    <div class="divider">OR</div>

                    <div class="action-block">
                        <h3>Join Existing Room</h3>
                        <div class="input-group">
                            <label for="join-player-name">Your Name:</label>
                            <input type="text" id="join-player-name" placeholder="Enter your name...">
                        </div>
                        <div class="input-group">
                            <label for="room-code">Room Code:</label>
                            <input type="text" id="room-code" placeholder="Enter 4-digit code..." maxlength="4" inputmode="numeric">
                        </div>
                        <div class="button-row">
                            <button id="btn-join-player" class="btn secondary">Join Game</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 2. Lobby Screen (🌟 Chat ekhon Center-e) -->
            <section id="lobby-screen" class="screen hidden">
                <div class="glass-panel lobby-panel">
                    <div class="lobby-header">
                        <h2>Game Lobby</h2>
                        <div class="room-info">Room Code: <span id="display-room-code" class="highlight-text">---</span></div>
                    </div>
                    
                    <div class="lobby-body">
                        <div class="lobby-box">
                            <h3>Players Connected</h3>
                            <ul id="lobby-players" class="user-list"></ul>
                        </div>
                        
                        <!-- Premium Lobby Chat Container -->
                        <div class="lobby-chat-box">
                            <h3>Room Chat</h3>
                            <div id="lobby-chat-messages" class="chat-messages"></div>
                            <div class="chat-input-area">
                                <input type="text" id="lobby-chat-input" placeholder="Say hi...">
                                <button id="btn-send-lobby-chat" class="btn-send">Send</button>
                            </div>
                        </div>
                    </div>

                    <div class="lobby-footer">
                        <button id="btn-start-game" class="btn primary hidden">Start Game</button>
                    </div>
                </div>
            </section>

            <!-- 3. Game Screen -->
            <section id="game-screen" class="screen hidden">
                <!-- Top Bar -->
                <div class="game-header">
                    <div class="current-turn-display">
                        <h3>Turn: <span id="active-player-name" class="highlight-text">Waiting...</span></h3>
                    </div>
                    <div class="turn-order-list">
                        <div id="player-turn-order"></div>
                    </div>
                </div>

                <!-- Main Board -->
                <div class="game-board">
                    <div id="draw-pile" class="card-slot draw-deck">
                        <div class="uno-card">
                            <div class="card-inner">
                                <div class="card-back">DRAW<br>CARD</div>
                            </div>
                        </div>
                    </div>

                    <div class="center-table">
                        <div id="main-pile" class="card-slot main-card"></div>
                    </div>
                    
                    <div id="animation-layer"></div>
                </div>

                <!-- Player Hand -->
                <div class="player-hand-area">
                    <div id="player-hand" class="cards-container"></div>
                </div>

                <!-- 🌟 Floating Premium Chat Widget 🌟 -->
                <div id="floating-chat-widget">
                    <button id="btn-toggle-chat" class="chat-toggle-btn">
                        💬 <span id="chat-badge" class="badge hidden">New</span>
                    </button>
                    <div id="game-chat-panel" class="premium-chat-panel hidden">
                        <div class="chat-header">
                            <h4>Game Chat</h4>
                            <button id="btn-close-chat" class="close-btn">&times;</button>
                        </div>
                        <div id="game-chat-messages" class="chat-messages"></div>
                        <div class="chat-input-area">
                            <input type="text" id="game-chat-input" placeholder="Type a message...">
                            <button id="btn-send-game-chat" class="btn-send">Send</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- 4. Game Over / Standing Screen -->
            <section id="game-over-screen" class="screen hidden">
                <div class="glass-panel ranking-panel">
                    <h2>🏆 Match Standings 🏆</h2>
                    <div id="standings-list" class="standings-list"></div>
                    <button id="btn-return-lobby" class="btn secondary" style="margin-top: 20px;">Return to Lobby</button>
                </div>
            </section>
            
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>
</html>
